<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Четыре ключа</title>
    <script>
      (function () {
        const base = '/medvezhonok/';
        const currentUrl = new URL(window.location.href);
        const fallbackUrl = new URL(base, window.location.origin);

        if (currentUrl.pathname === fallbackUrl.pathname) {
          window.location.replace(fallbackUrl.href);
          return;
        }

        sessionStorage.setItem(
          'spa-redirect',
          currentUrl.pathname + currentUrl.search + currentUrl.hash,
        );
        window.location.replace(fallbackUrl.href);
      })();
    </script>
  </head>
  <body></body>
</html>
